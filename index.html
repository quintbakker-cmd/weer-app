<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#7DBEEA">
    <title>Weer Amersfoort</title>
    <link rel="stylesheet" href="stijl.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icoon-192.png">
    <link rel="apple-touch-icon" href="icoon-192.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

    <canvas id="golven-achtergrond"></canvas>

    <div class="versie-label">V15</div>

    <main class="container">

        <!-- Huidig weer -->
        <section class="huidig-weer" id="huidig-weer">
            <button class="locatie-knop" id="locatie-knop">
                <span class="locatie" id="locatie-naam">Amersfoort</span>
                <span class="locatie-potlood">✎</span>
            </button>
            <p class="tijd" id="huidig-tijd">--</p>

            <div class="huidig-hoofd">
                <span class="huidig-emoji" id="huidig-emoji">--</span>
                <span class="huidig-temp" id="huidig-temp">--°</span>
            </div>

            <p class="huidig-beschrijving" id="huidig-beschrijving">Laden...</p>
            <p class="huidig-gevoel">Voelt als <span id="huidig-gevoel">--°</span></p>

            <div class="huidig-details">
                <div class="detail">
                    <span class="detail-label">Neerslagkans</span>
                    <span class="detail-waarde" id="huidig-neerslagkans">--%</span>
                </div>
                <div class="detail">
                    <span class="detail-label">Regen</span>
                    <span class="detail-waarde" id="huidig-regen">-- mm</span>
                </div>
                <div class="detail">
                    <span class="detail-label">Buien</span>
                    <span class="detail-waarde" id="huidig-buien">-- mm</span>
                </div>
                <div class="detail">
                    <span class="detail-label">Pollen</span>
                    <span class="detail-waarde" id="huidig-pollen">--</span>
                </div>
            </div>
        </section>

        <!-- Rechter kolom: uurlijks + buienradar + 7-daags -->
        <div class="rechts-kolom">

            <!-- Uurlijkse voorspelling -->
            <section class="uurlijks">
                <h2 class="sectie-titel">Komende uren</h2>
                <div class="uur-rij" id="uur-rij"></div>
            </section>

            <!-- Buienradar -->
            <section class="radar">
                <h2 class="sectie-titel">Buienradar</h2>
                <div class="radar-kaart-wrapper">
                    <div id="radar-kaart"></div>
                    <div class="radar-bediening">
                        <button id="radar-afspelen" class="radar-knop">▶</button>
                        <span class="radar-tijd" id="radar-tijd">--:--</span>
                    </div>
                </div>
                <input type="range" id="radar-schuif" class="radar-schuif" min="0" max="24" value="0" step="1">
                <p class="radar-melding" id="radar-melding" style="display: none;"></p>
                <p class="radar-credit">Radardata van <a href="https://www.knmi.nl" target="_blank" rel="noopener">KNMI</a></p>
            </section>

            <!-- 7-daagse voorspelling -->
            <section class="dagelijks">
                <h2 class="sectie-titel">7-daagse voorspelling</h2>
                <div class="dag-lijst" id="dag-lijst"></div>
            </section>

        </div>

    </main>

    <!-- Locatie zoeken overlay -->
    <div class="overlay" id="locatie-overlay">
        <div class="overlay-kaart locatie-overlay-kaart">
            <button class="overlay-sluiten" id="locatie-overlay-sluiten">✕</button>
            <h3 class="overlay-subtitel" style="margin-top: 0;">Locatie wijzigen</h3>
            <input type="text" id="locatie-input" class="locatie-input"
                placeholder="Typ een plaatsnaam, bijv. Utrecht" autocomplete="off">
            <div class="locatie-resultaten" id="locatie-resultaten"></div>
        </div>
    </div>

    <!-- Dag detail overlay -->
    <div class="overlay" id="dag-overlay">
        <div class="overlay-kaart">
            <button class="overlay-sluiten" id="overlay-sluiten">✕</button>
            <p class="overlay-datum" id="overlay-datum">--</p>
            <div class="overlay-hoofd">
                <span class="overlay-emoji" id="overlay-emoji">--</span>
                <span class="overlay-temp" id="overlay-temp">--°</span>
            </div>
            <p class="overlay-beschrijving" id="overlay-beschrijving">--</p>
            <div class="overlay-details">
                <div class="detail">
                    <span class="detail-label">Zonsopgang</span>
                    <span class="detail-waarde" id="overlay-zonsopgang">--:--</span>
                </div>
                <div class="detail">
                    <span class="detail-label">Zonsondergang</span>
                    <span class="detail-waarde" id="overlay-zonsondergang">--:--</span>
                </div>
                <div class="detail">
                    <span class="detail-label">Regen totaal</span>
                    <span class="detail-waarde" id="overlay-regen">-- mm</span>
                </div>
                <div class="detail">
                    <span class="detail-label">Pollen</span>
                    <span class="detail-waarde" id="overlay-pollen">--</span>
                </div>
            </div>
            <h3 class="overlay-subtitel">Uurlijks overzicht</h3>
            <div class="overlay-uren" id="overlay-uren"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("service-worker.js");
            });
        }
    </script>
</body>
</html>
